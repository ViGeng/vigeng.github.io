site_name: GENG Wei's Homepage
site_description: Wei GENG's personal webpage.
site_author: "Wei GENG"
site_url: "https://wgeng.site/"
docs_dir: docs/
repo_name: "vigeng/vigeng.github.io"
repo_url: "https://github.com/ViGeng/vigeng.github.io"
nav:
  - Home: index.md
  - Publications:
      - papers/index.md
      - SMOOTH: papers/smooth.md
      - Budget-Adaptive Routing: papers/bgt-ada.md
      - KUT (Poster): papers/kut.md
      - "SoK: Distributed Computing in ICN": papers/sok.md
  - Teaching & Supervision: teaching/index.md

theme:
  name: material
  logo: figures/favicon.png
  custom_dir: overrides

  favicon: figures/favicon.png
  palette:
    #primary: blue grey
    - media: "(prefers-color-scheme: light)"
      scheme: default # 日间模式
      primary: blue grey # 上方的
      accent: teal # 链接等可交互元件的高亮色
      toggle:
        icon: material/weather-night # 图标
        name: Switch to Dark Theme # 鼠标悬浮提示
    - media: "(prefers-color-scheme: dark)"
      scheme: slate # 夜间模式
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to Light Theme
  features:
    - navigation.instant #- header.autohide  #自动隐藏
    - navigation.instant.prefetch
    - announce.dismiss #呈现可标记为由用户读取的临时公告，可以包含一个用于取消当前公告的按钮
    - navigation.tracking #地址栏中的 URL 将自动更新为在目录中突出显示的活动锚点
    - navigation.tabs #顶级部分将呈现在上面视口标题下方的菜单层中，但在移动设备上保持原样
    - navigation.path
    # - navigation.tabs.sticky  #启用粘性选项卡后，导航选项卡将锁定在标题下方，并在向下滚动时始终保持可见
    - navigation.sections #启用部分后，顶级部分在边栏中呈现为1220px以上视口的组，但在移动设备上保持原样
    - navigation.top # 返回顶部的按钮 在上滑时出现
    - search.suggest # 搜索输入一些字母时推荐补全整个单词
    - search.highlight # 搜索出的文章关键词加入高亮
    - navigation.expand # 打开Tab时左侧目录全部展开
    - navigation.indexes #启用节索引页后，可以将文档直接附加到节
    - search.share #搜索分享按钮
    - content.tabs.link
    - content.tooltips
    - content.code.copy
    - content.action.edit
    - content.action.view

# Footer copyright (with auto-updating end year) is defined in overrides/partials/copyright.html

extra:
  generator: false #删除页脚显示“使用 MkDocs 材料制造”
  social:
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/WGeng_
    - icon: fontawesome/brands/github
      link: https://github.com/ViGeng
    - icon: fontawesome/regular/envelope
      link: mailto:wei.geng@tum.de
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/wegeng
    - icon: fontawesome/brands/orcid
      link: https://orcid.org/0000-0001-5970-3550
    - icon: fontawesome/brands/researchgate
      link: https://www.researchgate.net/profile/Wei-Geng-9
    - icon: fontawesome/brands/google-scholar
      link: https://scholar.google.com/citations?user=Zq6m2CIAAAAJ&hl=en
  analytics:
    provider: google
    property: G-3K0WBLE30D

plugins:
  - git-revision-date-localized:
      enable_creation_date: true
  - tags
  - offline
  - search

markdown_extensions:
  - abbr
  - attr_list
  - admonition
  - def_list
  - footnotes
  - md_in_html
  - meta # 支持Markdown文件上方自定义标题标签等
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets:
      base_path:
        - .
        - includes      # partial includes live here, outside docs/ (e.g. news.md)
      check_paths: true  # fail the build loudly if an --8<-- include is missing
  - pymdownx.smartsymbols
  - pymdownx.tilde
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format:
            !!python/name:pymdownx.superfences.fence_code_format # 代码块高亮插件


  - pymdownx.arithmatex: # latex支持
      generic: true
  - toc:
      permalink: true # 固定标题位置为当前位置
  - pymdownx.highlight: # 代码块高亮
      anchor_linenums: true
      linenums: true # 显示行号
      # auto_title: true # 显示编程语言名称
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - markdown.extensions.toc:
      slugify:
        !!python/object/apply:pymdownx.slugs.slugify { kwds: { case: lower } }
      permalink: "\ue157"

extra_javascript:
  - javascripts/copyright-year.js
  - javascripts/external-links.js # open outbound links in a new tab
  - javascripts/news.js # expandable news thumbnails + image lightbox
  # MathJax for pymdownx.arithmatex (generic mode). Config first, then the
  # library from a pinned CDN. No polyfill.io (it was hijacked in 2024).
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css
